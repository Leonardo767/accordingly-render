<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Application submitted</title>
<style>
  :root{
    --ink:#1f2937;
    --paper:#f5f6f8;
    --panel:#ffffff;
    --line:#d6dade;
    --muted:#6b7280;
    --success:#137a41;
    --accent:#1d4ed8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%;background:var(--paper);color:var(--ink);
    font-family:Arial,Helvetica,sans-serif;font-size:14px;}
  main{max-width:520px;margin:0 auto;padding:48px 20px;}
  .panel{
    border:1px solid var(--line);border-radius:8px;background:var(--panel);
    padding:28px 24px;
    box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  }
  h1{font-size:20px;font-weight:700;margin:0 0 8px;}
  p{margin:0 0 16px;color:var(--muted);line-height:1.5;font-size:13px;}
  a{
    display:inline-block;font-size:13px;font-weight:600;padding:9px 16px;
    border-radius:6px;background:#fff;border:1px solid #b8bec5;color:var(--ink);
    text-decoration:none;
  }
  a:hover{background:#fafbfc}
  .ok{
    width:48px;height:48px;border-radius:50%;background:var(--success);color:#fff;
    display:grid;place-items:center;font-size:22px;margin-bottom:16px;
  }
</style>
</head>
<body>
<main>
  <div class="panel">
    <div class="ok" aria-hidden="true">✓</div>
    <h1>Application submitted</h1>
    <p>This wireframe stands in for a confirmation or next-step screen after submit.</p>
    <a href="chat.html">← Back to application</a>
  </div>
</main>
</body>
</html>
